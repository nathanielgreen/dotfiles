general.import = [
  # "~/.config/alacritty/catppuccin-latte.toml"
  "~/.config/alacritty/catppuccin-frappe.toml"
]

[font]
size = 18

[font.bold]
family = "BlexMono Nerd Font"
style = "Bold"

[font.bold_italic]
family = "BlexMono Nerd Font"
style = "Bold Italic"

[font.italic]
family = "BlexMono Nerd Font"
style = "Italic"

[font.normal]
family = "BlexMono Nerd Font"
style = "Regular"

[terminal.shell]
program = "/bin/zsh"

[env]
TERM = "xterm-256color"

[keyboard]
bindings = [
{ key = "T", mods = "Command", action = "None" },
{ key = "Return", mods = "Shift", chars = "\u001B\r" }
]
